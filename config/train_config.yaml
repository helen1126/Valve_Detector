# 训练配置文件

# 基础训练参数
epochs: 200
batch_size: 32

# 优化器配置
optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

# 学习率调度器
scheduler:
  name: cosine_annealing
  T_max: 50
  eta_min: 1.0e-6

# 损失函数配置
loss:
  # 组合损失：mae_weight * L1 + mse_weight * L2
  mae_weight: 0.7
  mse_weight: 0.3

# 早停配置
early_stopping:
  enabled: true
  monitor: val_mae
  patience: 10
  mode: min
  min_delta: 0.01

# 模型检查点配置
checkpoint:
  monitor: val_mae
  mode: min
  save_top_k: 3
  filename: "valve-{epoch:03d}-{val_mae:.4f}"
  save_last: true

# 梯度裁剪
gradient_clip:
  enabled: true
  max_norm: 1.0

# 混合精度训练
amp: true

# TensorBoard 日志目录
tensorboard_dir: ./logs/tensorboard

# 训练日志目录
log_dir: ./logs

# 随机种子
seed: 42

# GPU 配置
gpus: -1  # -1 表示使用所有可用 GPU

# 精度设置
precision: 16-mixed  # 混合精度训练

# 验证频率
val_check_interval: 1.0  # 每 1.0 个 epoch 验证一次

# 日志记录频率
log_every_n_steps: 10
